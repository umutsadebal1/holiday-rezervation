<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabzon Otelleri - TatilRez</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-trabzon">
    <header class="header">
        <div class="navbar">
            <div class="logo"><img src="img/logo.png" alt="logo" style="height:100px;margin-right:8px;"></div>
            <nav class="nav-links">
                <a href="index.html">Anasayfa</a>
                <a href="index.html#locations">Bölgeler</a>
                <a href="index.html#specials">Tatilim</a>
                <a href="index.html#contact">İletişim</a>
            </nav>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" title="Karanlık modu aç/kapat">🌙</button>
                <a href="reservations.html" class="btn-reservations">Rezervasyonlarım</a>
            </div>
        </div>
        <section class="location-hero" style="background: linear-gradient(135deg, rgba(46, 125, 50, 0.9), rgba(27, 94, 32, 0.9));">
            <img src="img/trabhero.jpg" alt="Trabzon" class="hero-image">
            <div class="hero-content">
                <h1>Trabzon</h1>
                <p>Karadeniz'in İncisi - Doğa, Kültür ve Yaylaların Güzelliği</p>
            </div>
        </section>
    </header>

    <main class="location-main">
        <section class="advanced-filters" id="advancedFilters">
            <h3>Filtrele ve Sırala</h3>

            <div class="filter-row">
                <label>Fiyat Aralığı (₺)</label>
                <div class="price-inputs">
                    <div class="price-input-group">
                        <label for="minPriceInput">Min</label>
                        <input type="number" id="minPriceInput" min="0" step="50" value="0" placeholder="0">
                    </div>
                    <div class="price-input-group">
                        <label for="maxPriceInput">Max</label>
                        <input type="number" id="maxPriceInput" min="0" step="50" value="3000" placeholder="3000">
                    </div>
                </div>
                <div class="range-values">
                    <span id="minPriceText">₺0</span>
                    <span id="maxPriceText">₺3000</span>
                </div>
            </div>

            <div class="filter-row">
                <label>Puan / Yıldız</label>
                <select id="ratingFilter">
                    <option value="0">Tümü</option>
                    <option value="4">4.0 ve üzeri</option>
                    <option value="4.5">4.5 ve üzeri</option>
                    <option value="4.8">4.8 ve üzeri</option>
                </select>
            </div>

            <div class="filter-row">
                <label>Oda-Konsept</label>
                <select id="conceptFilter">
                    <option value="">Tümü</option>
                    <option value="Her Sey Dahil">Her Şey Dahil</option>
                    <option value="Yarim Pansiyon">Yarım Pansiyon</option>
                    <option value="Oda Kahvalti">Oda Kahvaltı</option>
                </select>
            </div>

            <div class="filter-row">
                <label>Tema</label>
                <select id="themeFilter">
                    <option value="">Tümü</option>
                    <option value="Balayi">Balayı</option>
                    <option value="Cocuk Dostu">Çocuk Dostu</option>
                    <option value="Aquapark">Aquapark</option>
                    <option value="Yetiskin">Yetişkin</option>
                </select>
            </div>

            <div class="filter-row">
                <label>Olanaklar</label>
                <div class="amenities-wrap">
                    <label><input type="checkbox" class="amenityCheck" value="Spa"> Spa</label>
                    <label><input type="checkbox" class="amenityCheck" value="Havuz"> Havuz</label>
                    <label><input type="checkbox" class="amenityCheck" value="Denize Sifir"> Denize Sıfır</label>
                    <label><input type="checkbox" class="amenityCheck" value="Otopark"> Otopark</label>
                    <label><input type="checkbox" class="amenityCheck" value="Evcil Hayvan"> Evcil Hayvan</label>
                </div>
            </div>

            <div class="filter-row">
                <label>Sıralama</label>
                <select id="sortBy">
                    <option value="recommended">Önerilen</option>
                    <option value="priceAsc">En Düşük Fiyat</option>
                    <option value="priceDesc">En Yüksek Fiyat</option>
                    <option value="ratingDesc">En Yüksek Puan</option>
                    <option value="distanceAsc">Mesafeye Göre</option>
                </select>
            </div>

            <div class="filter-actions">
                <button type="button" id="clearFiltersBtn">Filtreleri Temizle</button>
            </div>
        </section>

        <section class="hotels-section">
            <h2>Trabzon'da Popüler Oteller</h2>
            <div class="hotels-grid" id="hotelsGrid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="texts4">© 2026 TatilRez. Tüm hakları saklıdır.</span>
            <a href="aboutme.html" class="my-name">Umut Sadebal</a>
        </div>
    </footer>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Rezervasyonunuzu Tamamlayın</h2>
            <form id="bookingForm" onsubmit="submitReservation(event)">
                <div class="form-group">
                    <label>Tatil Yeri / Otel Adı</label>
                    <input type="text" id="resortName" readonly>
                </div>
                <div class="form-group">
                    <label>Tam Adınız</label>
                    <input type="text" id="guestName" required>
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="guestEmail" required>
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="guestPhone" required>
                </div>
                <div class="form-group">
                    <label>Giriş Tarihi</label>
                    <input type="date" id="bookingCheckIn" required>
                </div>
                <div class="form-group">
                    <label>Çıkış Tarihi</label>
                    <input type="date" id="bookingCheckOut" required>
                </div>
                <div class="form-group">
                    <label>Konuk Sayısı</label>
                    <input type="number" id="bookingGuests" min="1" required>
                </div>
                <div class="form-group">
                    <label>Oda Tipi</label>
                    <select id="roomType" required>
                        <option value="">Oda Tipi Seçin</option>
                        <option value="Standard">Standart Oda</option>
                        <option value="Deluxe">Deluxe Oda</option>
                        <option value="Suite">Suite</option>
                        <option value="Villa">Özel Villa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Özel İstekler</label>
                    <textarea id="specialRequests" rows="4" placeholder="Herhangi bir özel istek..."></textarea>
                </div>
                <div class="price-summary">
                    <p>Toplam Fiyat: <strong id="totalPrice">₺0</strong></p>
                </div>
                <button type="submit" class="btn-book">Rezervasyonu Onayla</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
