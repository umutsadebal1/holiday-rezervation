<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatil Rezerve - Hesap Oluştur</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <!-- Sol Taraf - Form -->
        <div class="auth-form-section">
            <div class="auth-form-box">
                <div class="auth-header">
                    <h1>Hesap Oluştur</h1>
                    <p>30 günlük deneme sürümü ile başlayalım</p>
                </div>

                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="Ad Soyad"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="E-posta"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Şifre"
                                required
                            >
                            <button type="button" id="toggleSignupPasswordBtn" class="password-toggle" aria-label="Sifreyi goster veya gizle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Hesap Oluştur</button>
                </form>

                <div class="auth-divider">
                    <span>veya</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn google-btn" title="Google ile giriş yap">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="social-btn apple-btn" title="Apple ile giriş yap">
                        <i class="fab fa-apple"></i>
                    </button>
                    <button type="button" class="social-btn facebook-btn" title="Facebook ile giriş yap">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                </div>

                <div class="auth-footer">
                    <p>Zaten hesabınız var mı? <a href="index.html?openLogin=1">Giriş Yap</a></p>
                </div>
            </div>
        </div>

        <!-- Sağ Taraf - İllüstrasyon -->
        <div class="auth-illustration-section">
            <svg class="sunset-illustration" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
                <!-- Gökyüzü Gradyanı -->
                <defs>
                    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#8B5A8E;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#D4A574;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#E8C4A0;stop-opacity:1" />
                    </linearGradient>
                    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:#FFF9E6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
                    </radialGradient>
                </defs>

                <!-- Arka Plan -->
                <rect width="400" height="500" fill="url(#skyGradient)"/>

                <!-- Güneş -->
                <circle cx="320" cy="120" r="60" fill="url(#sunGradient)"/>

                <!-- Dağlar -->
                <polygon points="0,250 150,80 300,200 400,120 400,500 0,500" fill="#2C1B4E" opacity="0.8"/>
                <polygon points="0,280 120,150 250,240 400,180 400,500 0,500" fill="#4A3A6B" opacity="0.6"/>

                <!-- Su Dalgaları -->
                <ellipse cx="200" cy="350" rx="180" ry="80" fill="#6B5B8F" opacity="0.4"/>
                <path d="M 50 380 Q 100 370, 150 380 T 250 380 T 350 380" stroke="#9B8BB8" stroke-width="2" fill="none" opacity="0.5"/>

                <!-- Ağaçlar -->
                <g class="tree">
                    <rect x="280" y="280" width="4" height="50" fill="#1a1a1a"/>
                    <polygon points="282,250 265,280 299,280" fill="#0a0a0a"/>
                    <polygon points="282,270 268,290 296,290" fill="#0a0a0a"/>
                </g>
                <g class="tree">
                    <rect x="100" y="300" width="3" height="40" fill="#1a1a1a"/>
                    <polygon points="101.5,275 88,300 115,300" fill="#0a0a0a"/>
                    <polygon points="101.5,290 90,310 113,310" fill="#0a0a0a"/>
                </g>
                <g class="tree">
                    <rect x="200" y="320" width="3" height="35" fill="#1a1a1a"/>
                    <polygon points="201.5,298 190,320 213,320" fill="#0a0a0a"/>
                    <polygon points="201.5,310 191,328 212,328" fill="#0a0a0a"/>
                </g>

                <!-- Bitki -->
                <g class="plant">
                    <path d="M 320 200 Q 340 160, 350 120 M 320 200 Q 330 170, 320 130 M 320 200 Q 310 160, 300 120" 
                          stroke="#1a1a1a" stroke-width="2" fill="none"/>
                </g>
            </svg>
        </div>
    </div>

    <script src="assets/js/signpage.js"></script>
</body>
</html>
