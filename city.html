<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="cityPageTitle">Sehir Detayi - TatilRez</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-city">
    <header class="header">
        <div class="navbar">
            <div class="logo"><img src="img/logo.png" alt="logo" style="height:100px;margin-right:8px;"></div>
            <nav class="nav-links">
                <a href="index.html">Anasayfa</a>
                <a href="index.html#locations">Bolgeler</a>
                <a href="index.html#specials">Tatilim</a>
                <a href="index.html#contact">Iletisim</a>
            </nav>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" title="Karanlik modu ac/kapat">🌙</button>
                <a href="reservations.html" class="btn-reservations">Rezervasyonlarim</a>
            </div>
        </div>

        <section class="location-hero" id="cityHero" style="background: linear-gradient(135deg, rgba(11, 137, 105, 0.667), rgba(4, 102, 132, 0.7));">
            <img src="img/logo.png" alt="Sehir gorseli" class="hero-image" id="cityImage">
            <div class="hero-content">
                <h1 id="cityName">Yukleniyor...</h1>
                <p id="cityDescription">Sehir bilgileri yukleniyor.</p>
            </div>
        </section>
    </header>

    <main class="location-main">
        <section class="advanced-filters" id="advancedFilters">
            <h3>Filtrele ve Sirala</h3>

            <div class="filter-row">
                <label>Fiyat Araligi (₺)</label>
                <div class="price-inputs">
                    <div class="price-input-group">
                        <label for="minPriceInput">Min</label>
                        <input type="number" id="minPriceInput" min="0" step="50" value="0" placeholder="0">
                    </div>
                    <div class="price-input-group">
                        <label for="maxPriceInput">Max</label>
                        <input type="number" id="maxPriceInput" min="0" step="50" value="3000" placeholder="3000">
                    </div>
                </div>
                <div class="range-values">
                    <span id="minPriceText">₺0</span>
                    <span id="maxPriceText">₺3000</span>
                </div>
            </div>

            <div class="filter-row">
                <label>Puan / Yildiz</label>
                <select id="ratingFilter">
                    <option value="0">Tumu</option>
                    <option value="4">4.0 ve uzeri</option>
                    <option value="4.5">4.5 ve uzeri</option>
                    <option value="4.8">4.8 ve uzeri</option>
                </select>
            </div>

            <div class="filter-row">
                <label>Oda-Konsept</label>
                <select id="conceptFilter">
                    <option value="">Tumu</option>
                    <option value="Her Sey Dahil">Her Sey Dahil</option>
                    <option value="Yarim Pansiyon">Yarim Pansiyon</option>
                    <option value="Oda Kahvalti">Oda Kahvalti</option>
                </select>
            </div>

            <div class="filter-row">
                <label>Tema</label>
                <select id="themeFilter">
                    <option value="">Tumu</option>
                    <option value="Balayi">Balayi</option>
                    <option value="Cocuk Dostu">Cocuk Dostu</option>
                    <option value="Aquapark">Aquapark</option>
                    <option value="Yetiskin">Yetiskin</option>
                </select>
            </div>

            <div class="filter-row">
                <label>Olanaklar</label>
                <div class="amenities-wrap">
                    <label><input type="checkbox" class="amenityCheck" value="Spa"> Spa</label>
                    <label><input type="checkbox" class="amenityCheck" value="Havuz"> Havuz</label>
                    <label><input type="checkbox" class="amenityCheck" value="Denize Sifir"> Denize Sifir</label>
                    <label><input type="checkbox" class="amenityCheck" value="Otopark"> Otopark</label>
                    <label><input type="checkbox" class="amenityCheck" value="Evcil Hayvan"> Evcil Hayvan</label>
                </div>
            </div>

            <div class="filter-row">
                <label>Siralama</label>
                <select id="sortBy">
                    <option value="recommended">Onerilen</option>
                    <option value="priceAsc">En Dusuk Fiyat</option>
                    <option value="priceDesc">En Yuksek Fiyat</option>
                    <option value="ratingDesc">En Yuksek Puan</option>
                    <option value="distanceAsc">Mesafeye Gore</option>
                </select>
            </div>

            <div class="filter-actions">
                <button type="button" id="clearFiltersBtn">Filtreleri Temizle</button>
            </div>
        </section>

        <section class="hotels-section">
            <h2 id="cityHotelsTitle">Populer Oteller</h2>
            <div class="hotels-grid" id="hotelsGrid">
                <p id="cityLoadingState">Sehir yukleniyor...</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="texts4">© 2026 TatilRez. Tum haklari saklidir.</span>
            <a href="aboutme.html" class="my-name">Umut Sadebal</a>
        </div>
    </footer>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Rezervasyonunuzu Tamamlayin</h2>
            <form id="bookingForm" onsubmit="submitReservation(event)">
                <div class="form-group">
                    <label>Tatil Yeri / Otel Adi</label>
                    <input type="text" id="resortName" readonly>
                </div>
                <div class="form-group">
                    <label>Tam Adiniz</label>
                    <input type="text" id="guestName" required>
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="guestEmail" required>
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="guestPhone" required>
                </div>
                <div class="form-group">
                    <label>Giris Tarihi</label>
                    <input type="date" id="bookingCheckIn" required>
                </div>
                <div class="form-group">
                    <label>Cikis Tarihi</label>
                    <input type="date" id="bookingCheckOut" required>
                </div>
                <div class="form-group">
                    <label>Konuk Sayisi</label>
                    <input type="number" id="bookingGuests" min="1" required>
                </div>
                <div class="form-group">
                    <label>Oda Tipi</label>
                    <select id="roomType" required>
                        <option value="">Oda Tipi Secin</option>
                        <option value="Standard">Standart Oda</option>
                        <option value="Deluxe">Deluxe Oda</option>
                        <option value="Suite">Suite</option>
                        <option value="Villa">Ozel Villa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ozel Istekler</label>
                    <textarea id="specialRequests" rows="4" placeholder="Herhangi bir ozel istek..."></textarea>
                </div>
                <div class="price-summary">
                    <p>Toplam Fiyat: <strong id="totalPrice">₺0</strong></p>
                </div>
                <button type="submit" class="btn-book">Rezervasyonu Onayla</button>
            </form>
        </div>
    </div>

    <script src="cities.js"></script>
    <script src="title.js"></script>
    <script src="hotels.js"></script>
    <script src="app.js"></script>
</body>
</html>
